baseURL: https://litewhite.github.io/
locale: zh-cn
title: Litewhite's Dev Log
theme: ["PaperMod"]
params:
  ShowCodeCopyButtons: true
  assets:
    disableHLJS: true
markup:
  highlight:
    noClasses: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: "dracula"
taxonomies:
  tag: tags
  category: categories
  series: series
menu:
  main:
    - name: Posts
      url: /posts/
      weight: 10
    - name: Tags
      url: /tags/
      weight: 20
    - name: About
      url: /about/
      weight: 30